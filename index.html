<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Priya 💝</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #c0392b; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:#fff;overflow:hidden;height:100vh;width:100vw;position:relative;}

.page{display:none;width:100vw;height:100vh;flex-direction:column;align-items:center;justify-content:center;position:fixed;top:0;left:0;padding:15px;z-index:10;}
.page.active{display:flex;animation:fadeIn 0.6s ease;}

@keyframes fadeIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}

.polaroid{background:#fff;padding:10px;box-shadow:0 10px 30px rgba(0,0,0,0.5);transform:rotate(var(--r,-3deg));max-width:85%;max-height:55vh;border-radius:6px;overflow:hidden;}
.polaroid img{width:100%;height:auto;max-height:52vh;display:block;object-fit:contain;border:2px solid #eee;}

.btn-main{background:#fff;color:var(--bg);border:none;padding:13px 30px;border-radius:50px;font-size:1.05rem;font-weight:600;cursor:pointer;margin-top:20px;box-shadow:0 5px 20px rgba(0,0,0,0.3);}

.dot{width:16px;height:16px;border:2px solid #fff;border-radius:50%;margin:0 6px;}
.dot.filled{background:#fff;box-shadow:0 0 12px #fff;}

.kkey{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);color:#fff;font-size:1.4rem;cursor:pointer;}

#petals{position:fixed;inset:0;pointer-events:none;z-index:1;}
.petal{position:absolute;font-size:1.8rem;animation:fall linear forwards;opacity:0.9;}

@keyframes fall{to{transform:translateY(110vh);}}
</style>
</head>
<body>

<div id="petals"></div>

<!-- Lock Screen -->
<div class="page active" id="p-lock">
    <div class="polaroid" style="--r:-5deg;margin-bottom:25px"><img src="photo1.png"><span>For PRIYA 💕</span></div>
    <div style="display:flex;margin:15px 0"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
    
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <button class="kkey" onclick="tap(1)">1</button>
        <button class="kkey" onclick="tap(2)">2</button>
        <button class="kkey" onclick="tap(3)">3</button>
        <button class="kkey" onclick="tap(4)">4</button>
        <button class="kkey" onclick="tap(5)">5</button>
        <button class="kkey" onclick="tap(6)">6</button>
        <button class="kkey" onclick="tap(7)">7</button>
        <button class="kkey" onclick="tap(8)">8</button>
        <button class="kkey" onclick="tap(9)">9</button>
        <div></div>
        <button class="kkey" onclick="tap(0)">0</button>
        <button class="kkey" onclick="del()">⌫</button>
    </div>
</div>

<!-- Camera -->
<div class="page" id="p-cam">
    <h2 style="font-family:'Playfair Display';font-size:1.7rem;margin-bottom:25px;text-align:center;">SMILE bandariya 🐒</h2>
    <div class="polaroid" style="max-height:45vh;width:240px;" id="cam-frame"><img src="photo2.png"></div>
    <button class="btn-main" id="btn-snap" onclick="snap()">📸 TAKE PICTURE</button>
    <button class="btn-main" id="btn-next-cam" style="display:none;" onclick="go('p-reveal')">NEXT →</button>
</div>

<!-- Reveal -->
<div class="page" id="p-reveal">
    <h2 style="font-family:'Dancing Script';font-size:2.3rem;text-align:center;margin-bottom:15px;">OMG 😱<br>Priya Sundari 💕</h2>
    <div class="polaroid" style="max-height:50vh;"><img src="photo2.png"></div>
    <button class="btn-main" onclick="go('p-hub')">OPEN GIFTS 🎁</button>
</div>

<!-- Hub -->
<div class="page" id="p-hub">
    <h2 style="font-family:'Dancing Script';font-size:2.6rem;margin-bottom:40px;">Gifts for you</h2>
    <div style="display:flex;gap:35px;font-size:3.8rem;">
        <div onclick="go('p-letter')" style="cursor:pointer;">💌</div>
        <div onclick="go('p-gallery')" style="cursor:pointer;">📸</div>
        <div onclick="go('p-music')" style="cursor:pointer;">🎵</div>
    </div>
</div>

<!-- Letter -->
<div class="page" id="p-letter" style="background:#fffaf0;color:#333;justify-content:flex-start;padding-top:40px;overflow-y:auto;">
    <div style="background:white;padding:20px;border-radius:12px;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,0.15);">
        <h2 style="font-family:'Dancing Script';color:#c0392b;font-size:1.9rem;">Dear PRIYA,</h2>
        <p style="margin:20px 0;line-height:1.7;font-size:1.05rem;">
            smjh me nhi aa rha h kya likhe isiliye <br><br>
            thank you ☺️<br><br>
            Gussa mat hona itna kam likhe h to 😅
        </p>
        <div style="display:flex;gap:10px;justify-content:center;">
            <img src="photo3.png" style="max-height:180px;width:auto;border-radius:6px;">
            <img src="photo4.png" style="max-height:180px;width:auto;border-radius:6px;">
        </div>
        <p style="text-align:right;font-family:'Dancing Script';font-size:1.3rem;margin-top:15px;">— yours always 💕</p>
    </div>
    <button class="btn-main" onclick="go('p-hub')" style="background:#333;color:#fff;margin-top:25px;">BACK</button>
</div>

<!-- Gallery -->
<div class="page" id="p-gallery" style="justify-content:flex-start;padding-top:30px;">
    <h2 style="font-family:'Dancing Script';font-size:2.2rem;margin-bottom:15px;">Best Moments</h2>
    <div style="display:flex;gap:12px;overflow-x:auto;width:100%;padding:10px;">
        <div class="polaroid" style="--r:-3deg;flex-shrink:0;max-width:160px;"><img src="photo5.png"></div>
        <div class="polaroid" style="--r:4deg;flex-shrink:0;max-width:160px;"><img src="photo6.png"></div>
        <div class="polaroid" style="--r:-2deg;flex-shrink:0;max-width:160px;"><img src="photo7.png"></div>
    </div>
    <button class="btn-main" onclick="go('p-hub')">BACK</button>
</div>

<!-- Music -->
<div class="page" id="p-music">
    <h2 style="font-family:'Dancing Script';font-size:2.3rem;margin-bottom:20px;">Our Song 🎵</h2>
    <div style="width:200px;height:200px;border-radius:50%;padding:10px;background:#111;" id="vinyl">
        <img src="photo8.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
    </div>
    <button class="btn-main" onclick="toggleMusic()" id="play-btn" style="margin:25px 0 10px;">▶ Play Song</button>
    <button class="btn-main" onclick="go('p-hub')" style="background:#333;color:#fff;">BACK</button>
</div>

<audio id="bg-music" loop><source src="YOUR_SONG.mp3" type="audio/mpeg"></audio>

<script>
// Same script as before
let input = "";
function go(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function tap(n) {
    if(input.length < 4){
        input += n;
        updateDots();
        if(input === "2208") setTimeout(() => go('p-cam'), 250);
        else if(input.length === 4){ alert("Wrong Passcode!"); input=""; updateDots(); }
    }
}
function del(){ input = input.slice(0,-1); updateDots(); }
function updateDots(){
    for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < input.length);
}

function snap(){
    document.getElementById('flash').classList.add('flash-on');
    document.getElementById('btn-snap').style.display = 'none';
    setTimeout(()=>{ 
        document.getElementById('flash').classList.remove('flash-on');
        document.getElementById('btn-next-cam').style.display = 'block';
    }, 1500);
}

let isPlaying = false;
function toggleMusic(){
    const audio = document.getElementById('bg-music');
    const btn = document.getElementById('play-btn');
    if(!isPlaying){
        audio.play();
        btn.textContent = '⏸ Pause';
        isPlaying = true;
    } else {
        audio.pause();
        btn.textContent = '▶ Play Song';
        isPlaying = false;
    }
}

// Petals + Flash
setInterval(() => {
    const p = document.createElement('div'); p.className='petal';
    p.textContent = ['❤️','🌸','💕'][Math.floor(Math.random()*3)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.animationDuration = (Math.random()*5 + 8) + 's';
    document.getElementById('petals').appendChild(p);
    setTimeout(()=>p.remove(), 14000);
}, 400);

const flash = document.createElement('div');
flash.id = 'flash';
flash.style = 'position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:999;';
document.body.appendChild(flash);
</script>

<style>
#flash{animation:flashAnim 0.7s;} 
@keyframes flashAnim{0%,100%{opacity:0} 40%{opacity:0.85}}
</style>
</body>
</html>
